<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050403">
<meta name="robots" content="noindex,nofollow">
<title>Админ-панель · Песчаный факел</title>
<style>
  :root{
    --bg:#050403; --panel:#0b0907;
    --line:rgba(214,160,82,.16); --line-soft:rgba(214,160,82,.08);
    --ink:#b89a63; --ink-dim:#6f5d3c; --amber:#e3ad45; --amber-hot:#ffc24d;
    --rust:#8a3b2c; --green:#57c98a;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased;
    background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
    background-size:38px 38px;min-height:100vh;padding:28px 20px 48px;
  }
  .wrap{max-width:960px;margin:0 auto}
  h1{font-size:15px;letter-spacing:.26em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:6px}
  .sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--rust);margin-bottom:26px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:18px}

  .side{position:relative;background:linear-gradient(180deg,var(--panel),#070605);border:1px solid var(--line);padding:20px}
  .side-head{display:flex;align-items:center;gap:9px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin-bottom:16px}
  .side-head .tick{width:7px;height:7px;background:var(--rust);box-shadow:0 0 6px var(--rust)}
  .side-head .px{margin-left:auto;color:var(--ink-dim);letter-spacing:.1em}

  .codebox{border:1px solid var(--line);background:rgba(0,0,0,.35);padding:14px;margin-bottom:16px}
  .code-lbl{font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px}
  .code-val{font-size:24px;font-weight:600;letter-spacing:.14em;color:var(--amber-hot);text-shadow:0 0 14px rgba(255,194,77,.18);word-break:break-all}
  .code-seg{font-size:12px;color:var(--ink-dim);margin-top:6px;letter-spacing:.1em}

  .rows{display:flex;flex-direction:column;gap:7px}
  .row{display:flex;align-items:center;gap:10px;font-size:12px;border:1px solid var(--line-soft);background:rgba(0,0,0,.2);padding:8px 10px}
  .row.term{border-color:rgba(87,201,138,.25)}
  .rn{color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border:1px solid currentColor;white-space:nowrap}
  .badge.real{color:var(--green)}
  .badge.decoy{color:var(--rust)}
  .badge.term{color:var(--amber-hot)}
  .frag{color:var(--amber-hot);font-weight:600;letter-spacing:.08em;min-width:48px}
  .frag.none{color:var(--ink-dim);font-weight:400}
  .lnk{flex:1;color:var(--ink);text-decoration:none;word-break:break-all;border-bottom:1px solid transparent}
  .lnk:hover{color:var(--amber);border-bottom-color:var(--amber)}
  .mini{cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    border:1px solid var(--line);background:transparent;color:var(--ink-dim);padding:6px 9px;white-space:nowrap;transition:.15s}
  .mini:hover{border-color:var(--amber);color:var(--amber)}
  .mini.ok{border-color:var(--green);color:var(--green)}
  .mini.wide{width:100%;margin-top:10px;padding:9px}
  .foot{margin-top:24px;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}

  /* --- замок (форма пароля) --- */
  .gate{max-width:380px;margin:14vh auto 0;background:linear-gradient(180deg,var(--panel),#070605);border:1px solid var(--line);padding:30px 26px}
  .gate h1{margin-bottom:6px}
  .gate .sub{margin-bottom:22px}
  .gate input{width:100%;font-family:var(--mono);font-size:16px;letter-spacing:.05em;color:var(--amber-hot);
    background:rgba(0,0,0,.35);border:1px solid var(--line);padding:13px 12px;outline:none;transition:border-color .15s}
  .gate input:focus{border-color:var(--amber-hot)}
  .gate.err input{border-color:var(--rust);color:#c66}
  .gate .btn{appearance:none;cursor:pointer;width:100%;margin-top:10px;font-family:var(--mono);font-size:13px;
    letter-spacing:.14em;text-transform:uppercase;padding:14px;border:1px solid rgba(227,173,69,.45);background:transparent;color:var(--amber)}
  .gate .btn:hover{background:rgba(227,173,69,.07)}
  .gate .msg{min-height:15px;margin-top:12px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--rust)}
  .hidden{display:none}
</style>
</head>
<body>
  <!-- ЗАМОК: содержимое админки зашифровано, открывается только верным паролем -->
  <form class="gate" id="gate" autocomplete="off">
    <h1>Админ-панель · Песчаный факел</h1>
    <div class="sub">доступ только для гейм-мастера</div>
    <input type="password" id="pw" placeholder="Пароль" aria-label="Пароль" autofocus>
    <button class="btn" type="submit">Войти</button>
    <div class="msg" id="msg"></div>
  </form>

  <div class="wrap hidden" id="panel">
    <h1>Админ-панель · Песчаный факел</h1>
    <div class="sub">только для гейм-мастера · не раздавать игрокам</div>
    <div id="content"></div>
  </div>

<script>
  
  function bindCopy(btn, text){
    var label = btn.getAttribute('data-label') || btn.textContent;
    var okText = btn.getAttribute('data-ok') || 'Скопировано ✓';
    var t;
    function done(){
      btn.classList.add('ok'); btn.textContent = okText;
      clearTimeout(t); t = setTimeout(function(){ btn.classList.remove('ok'); btn.textContent = label; }, 1600);
    }
    function fallback(){
      var ta=document.createElement('textarea');
      ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand('copy'); done(); }catch(e){}
      document.body.removeChild(ta);
    }
    btn.addEventListener('click', function(){
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(done, fallback);
      } else { fallback(); }
    });
  }

  var gate = document.getElementById('gate'), pw = document.getElementById('pw'), msg = document.getElementById('msg');

  function b64(s){ return Uint8Array.from(atob(s), function(c){ return c.charCodeAt(0); }); }

  async function unlock(password){
    var enc = new TextEncoder();
    var base = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64(BLOB.salt), iterations:BLOB.iter, hash:'SHA-256' },
      base, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    var plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(BLOB.iv) }, key, b64(BLOB.data));
    return new TextDecoder().decode(plain);
  }

  function reveal(html){
    document.getElementById('content').innerHTML = html;
    gate.classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
    document.querySelectorAll('[data-copy]').forEach(function(b){
      b.setAttribute('data-ok','скопировано ✓');
      bindCopy(b, b.getAttribute('data-copy'));
    });
  }

  gate.addEventListener('submit', function(e){
    e.preventDefault();
    if(!(window.crypto && crypto.subtle)){ msg.textContent = 'Нужен https (или localhost)'; return; }
    msg.textContent = '…';
    unlock(pw.value).then(reveal).catch(function(){
      gate.classList.add('err'); msg.textContent = 'Неверный пароль'; pw.select();
    });
  });
</script>
