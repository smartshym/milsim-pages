<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050403">
<meta name="robots" content="noindex,nofollow">
<title>CRM · движок</title>
<style>
  :root{ --bg:#050403; --panel:#0b0907; --line:rgba(214,160,82,.2);
    --ink:#b89a63; --ink-dim:#6f5d3c; --amber:#e3ad45; --amber-hot:#ffc24d; --green:#57c98a; --rust:#8a3b2c;
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);padding:20px 16px 60px}
  .wrap{max-width:1000px;margin:0 auto}
  h1{font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
  .sub{font-size:11px;color:var(--ink-dim);margin-bottom:18px;letter-spacing:.1em}
  h2{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-hot);margin:22px 0 10px}
  .bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  button,.lnk{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
    padding:9px 12px;background:transparent;border:1px solid var(--line);color:var(--ink);text-decoration:none}
  button:hover,.lnk:hover{border-color:var(--amber);color:var(--amber)}
  button.pri{border-color:var(--green);color:var(--green)}
  button.del{border-color:var(--rust);color:#c66}
  #msg{font-size:11px;color:var(--green);margin-left:6px;align-self:center}
  table{width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:8px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--ink-dim);text-transform:uppercase;letter-spacing:.08em;font-size:9.5px}
  td .mini{padding:4px 7px;font-size:10px;margin-right:4px}
  .form{border:1px solid var(--line);background:var(--panel);padding:14px;display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:8px}
  .form label{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);margin-bottom:4px}
  .form input,.form select{width:100%;font-family:var(--mono);font-size:12px;color:var(--amber-hot);
    background:rgba(0,0,0,.35);border:1px solid var(--line);padding:8px;outline:none}
  .form .full{grid-column:1/-1}
  .form details.advbox{grid-column:1/-1;border-top:1px solid var(--line);padding-top:8px}
  .form details.advbox summary{cursor:pointer;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);margin-bottom:8px}
  .form details.advbox .advgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  textarea{width:100%;min-height:120px;font-family:var(--mono);font-size:12px;color:var(--amber-hot);
    background:rgba(0,0,0,.35);border:1px solid var(--line);padding:10px;outline:none}
  .c-coalition{color:#4d9bff}.c-insurgents{color:#ff4d4d}.c-shared{color:var(--green)}
  .siderow{display:flex;gap:6px;align-items:center;margin:3px 0}
  .siderow .sk{font-size:10px;color:var(--ink-dim);width:64px}
  .siderow input[type=color]{width:38px;height:28px;padding:2px}
</style>
</head>
<body>
<div class="wrap">
  <h1>CRM · конфигуратор</h1>
  <div class="sub">правишь настройки/точки → «Сохранить в БД» → движок (map/point) подхватывает. namespace: game/<span id="run"></span>/</div>

  <div class="bar">
    <button class="pri" id="save">Сохранить в БД</button>
    <button id="seed">Пустой шаблон</button>
    <a class="lnk" id="lAdmin" target="_blank">Карта · админ</a>
    <a class="lnk" href="logs.html" target="_blank">Логи</a>
    <span id="msg"></span>
  </div>

  <h2>Настройки игры</h2>
  <div id="settings" class="form"></div>

  <h2>Координаты</h2>
  <div id="coords"></div>
  <button id="addCoord">+ Координата</button>

  <h2>Точки</h2>
  <div id="tbl"></div>
  <button id="add">+ Добавить точку</button>
  <div id="form" style="display:none"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script src="schema.js"></script>
<script src="labels.js"></script>
<script src="state.js"></script>
<script>
(function(){
  var SB=window.GAME; State.init(SB);
  document.getElementById('run').textContent=SB.run;
  document.getElementById('lAdmin').href='map.html?view=admin';

  function defCfg(){ return JSON.parse(JSON.stringify(window.SCHEMA.BLANK)); }   // «Загрузить дефолт» = пустой шаблон нового прогона
  var cfg=null, editIdx=null;
  function el(id){ return document.getElementById(id); }
  function msg(t){ el('msg').textContent=t; setTimeout(function(){ el('msg').textContent=''; },2500); }

  State.loadConfig(function(db){ cfg = db || defCfg(); if(!cfg.objectives) cfg.objectives=[]; renderAll(); });

  function renderAll(){ renderTable(); renderSettings(); renderCoords(); }

  // --- настройки игры (нормальные поля вместо сырого JSON) ---
  function renderSettings(){
    var m=cfg.mechanics||{}, geo=cfg.geo||{}, L=window.LABELS.settings;
    var sidesHtml=Object.keys(cfg.sides||{}).map(function(s){ var sd=cfg.sides[s]||{};
      return '<div class="siderow" data-side="'+s+'"><span class="sk">'+s+'</span>'
        +'<input class="sl" value="'+(sd.label||'')+'" placeholder="Название">'
        +'<input class="sc" type="color" value="'+(sd.color||'#888888')+'">'
        +'<button class="mini del sdel">×</button></div>'; }).join('');
    el('settings').innerHTML=
       '<div class="full"><label>'+L.sides+'</label><div id="sides">'+sidesHtml+'</div><button class="mini" id="addSide" style="margin-top:4px">+ сторона</button></div>'
      +fld(L.captureSec,'<input id="s_cap" type="number" value="'+(m.captureSec!=null?m.captureSec:900)+'">')
      +fld(L.posIntervalSec,'<input id="s_pos" type="number" value="'+(m.posIntervalSec!=null?m.posIntervalSec:60)+'">')
      +fld(L.staleSec,'<input id="s_stale" type="number" value="'+(m.staleSec!=null?m.staleSec:300)+'">')
      +fld('Общее время игры (мин)','<input id="s_gt" type="number" value="'+(m.gameTime!=null?m.gameTime:'')+'">')
      +'<div><label>'+L.showEnemyCaptures+'</label><select id="s_enemy"><option value="1"'+(m.showEnemyCaptures!==false?' selected':'')+'>да</option><option value="0"'+(m.showEnemyCaptures===false?' selected':'')+'>нет</option></select></div>'
      +'<details class="full advbox"><summary>'+L.geo+' (георефер.)</summary><div class="advgrid">'
        +fld('Изображение','<input id="g_img" value="'+(geo.image||'')+'">')
        +fld('Север','<input id="g_n" value="'+(geo.north!=null?geo.north:'')+'">')
        +fld('Юг','<input id="g_s" value="'+(geo.south!=null?geo.south:'')+'">')
        +fld('Восток','<input id="g_e" value="'+(geo.east!=null?geo.east:'')+'">')
        +fld('Запад','<input id="g_w" value="'+(geo.west!=null?geo.west:'')+'">')
        +fld('Цвет общих точек','<input id="g_shared" type="color" value="'+((cfg.shared&&cfg.shared.color)||'#57c98a')+'">')
      +'</div></details>';
    el('addSide').onclick=function(){ readSettings(); var k='side'+(Object.keys(cfg.sides||{}).length+1); (cfg.sides=cfg.sides||{})[k]={label:'Новая сторона',color:'#888888'}; renderSettings(); };
    el('settings').querySelectorAll('.sdel').forEach(function(b){ b.onclick=function(){ readSettings(); delete cfg.sides[b.parentNode.getAttribute('data-side')]; renderSettings(); }; });
  }
  function readSettings(){
    if(!el('s_cap')) return;                                    // ещё не отрисовано
    var sides={};
    el('settings').querySelectorAll('.siderow').forEach(function(r){ var k=r.getAttribute('data-side');
      if(k) sides[k]={ label:r.querySelector('.sl').value.trim(), color:r.querySelector('.sc').value }; });
    if(Object.keys(sides).length) cfg.sides=sides;
    var m=cfg.mechanics||{};
    m.captureSec=parseInt(val('s_cap'),10)||0; m.posIntervalSec=parseInt(val('s_pos'),10)||0; m.staleSec=parseInt(val('s_stale'),10)||0;
    m.showEnemyCaptures = val('s_enemy')==='1';
    var gt=val('s_gt'); if(gt!=='') m.gameTime=parseInt(gt,10); else delete m.gameTime;
    cfg.mechanics=m;
    cfg.geo={ image:val('g_img'), north:parseFloat(val('g_n')), south:parseFloat(val('g_s')), east:parseFloat(val('g_e')), west:parseFloat(val('g_w')) };
    cfg.shared=cfg.shared||{}; cfg.shared.color=val('g_shared');
  }

  // --- список координат (одна координата → под несколько точек) ---
  function coordInUse(id){ return (cfg.objectives||[]).some(function(o){ return o.coord===id; }); }
  function newCoordId(){ var n=0, cs=cfg.coords||{}; do{ n++; }while(cs['coord'+n]); return 'coord'+n; }
  function renderCoords(){
    var cs=cfg.coords||{};
    var rows=Object.keys(cs).map(function(id){ var c=cs[id]||{};
      return '<div class="siderow coordrow" data-coord="'+id+'"><span class="sk">'+id+'</span>'
        +'<input class="cl" value="'+(c.label||'')+'" placeholder="Название" style="width:160px">'
        +'<input class="clat" value="'+(c.lat!=null?c.lat:'')+'" placeholder="Широта" style="width:120px">'
        +'<input class="clng" value="'+(c.lng!=null?c.lng:'')+'" placeholder="Долгота" style="width:120px">'
        +'<button class="mini del cdel">×</button></div>'; }).join('');
    el('coords').innerHTML=rows||'<div class="sub">координат нет</div>';
    el('addCoord').onclick=function(){ readCoords(); var id=newCoordId(); (cfg.coords=cfg.coords||{})[id]={label:'Новая точка',lat:0,lng:0}; renderCoords(); };
    el('coords').querySelectorAll('.cdel').forEach(function(b){ b.onclick=function(){ var id=b.parentNode.getAttribute('data-coord');
      if(coordInUse(id)){ alert('Координата используется точкой — сначала перенастрой точки.'); return; }
      readCoords(); delete cfg.coords[id]; renderCoords(); renderTable(); }; });
  }
  function readCoords(){ var cs={};
    if(el('coords')) el('coords').querySelectorAll('.coordrow').forEach(function(r){ var id=r.getAttribute('data-coord');
      cs[id]={ label:r.querySelector('.cl').value.trim(), lat:parseFloat(r.querySelector('.clat').value), lng:parseFloat(r.querySelector('.clng').value) }; });
    cfg.coords=cs;
  }

  function revealStr(o){ var r=o.reveal||'always', L=window.LABELS.reveal;
    if(typeof r==='string') return L[r]||r;
    var key=r.scope==='side'?'flag-side':'flag-any'; return (L[key]||key)+(r.flag?' ('+r.flag+')':''); }
  function onOpenStr(o){ if(!o.onOpen) return window.LABELS.onOpen.none;
    var key=o.onOpen.event==='capture'?'capture':(o.onOpen.contest?'flag-contest':'flag');
    return (window.LABELS.onOpen[key]||key)+(o.onOpen.flag?' ('+o.onOpen.flag+')':''); }

  function renderTable(){
    var rows=cfg.objectives.map(function(o,i){
      var qr='';
      if(window.SCHEMA.QR.indexOf(o.kind)>=0){   // kind со страницей → QR-ссылка (см. schema.QR)
        if(o.side==='shared') qr=Object.keys(cfg.sides).map(function(s){ return '<a class="lnk mini" target="_blank" href="point.html?id='+(o.id||'')+'&side='+s+'">QR·'+s[0]+'</a>'; }).join('');
        else qr='<a class="lnk mini" target="_blank" href="point.html?id='+(o.id||'')+'">QR</a>';
      }
      var kindL=(window.LABELS.kinds[o.kind]||o.kind||''), sideL=((cfg.sides[o.side]&&cfg.sides[o.side].label)||(o.side==='shared'?'общая':(o.side||'')));
      return '<tr><td>'+(o.id||'')+'</td><td>'+kindL+'</td><td class="c-'+(o.side||'')+'">'+sideL+'</td>'
        +'<td>'+(o.decoy?'<span style="color:#c66">декой</span>':(o.fragment||'—'))+'</td>'
        +'<td>'+coordCell(o)+'</td>'
        +'<td>'+revealStr(o)+'</td><td>'+onOpenStr(o)+'</td>'
        +'<td><button class="mini" data-edit="'+i+'">ред.</button><button class="mini del" data-del="'+i+'">×</button>'+qr+'</td></tr>';
    }).join('');
    var C=window.LABELS.columns;
    el('tbl').innerHTML='<table><tr><th>'+C.id+'</th><th>'+C.kind+'</th><th>'+C.side+'</th><th>'+C.code+'</th><th>'+C.at+'</th><th>'+C.reveal+'</th><th>'+C.onOpen+'</th><th></th></tr>'+rows+'</table>';
    el('tbl').querySelectorAll('[data-edit]').forEach(function(b){ b.onclick=function(){ openForm(+b.dataset.edit); }; });
    el('tbl').querySelectorAll('[data-del]').forEach(function(b){ b.onclick=function(){ if(confirm('Удалить точку?')){ cfg.objectives.splice(+b.dataset.del,1); renderTable(); } }; });
  }

  function sideOpts(sel){ var ks=Object.keys(cfg.sides).concat(['shared']); return ks.map(function(s){ var lbl=(cfg.sides[s]&&cfg.sides[s].label)||(s==='shared'?'общая':s); return '<option value="'+s+'"'+(s===sel?' selected':'')+'>'+lbl+'</option>'; }).join(''); }
  function opt(list,sel,map){ return list.map(function(s){ return '<option value="'+s+'"'+(s===sel?' selected':'')+'>'+((map&&map[s])||s)+'</option>'; }).join(''); }
  function coordOpts(sel){ var cs=cfg.coords||{}; return '<option value="">— нет —</option>'+Object.keys(cs).map(function(id){ var c=cs[id]||{}; return '<option value="'+id+'"'+(id===sel?' selected':'')+'>'+(c.label||id)+' ('+c.lat+', '+c.lng+')</option>'; }).join(''); }
  function coordCell(o){ var c=(o.coord&&cfg.coords)?cfg.coords[o.coord]:null;
    if(c) return (c.label||o.coord)+' <span style="color:var(--ink-dim)">'+(+c.lat).toFixed(5)+', '+(+c.lng).toFixed(5)+'</span>';
    return o.at?o.at[0].toFixed(5)+', '+o.at[1].toFixed(5):'—'; }

  function has(id){ return !!el(id); }
  function fld(lbl,inner){ return '<div><label>'+lbl+'</label>'+inner+'</div>'; }
  function kindDefaults(k){ return window.SCHEMA.DEFAULTS[k] || {reveal:'always',onOpen:'none'}; }

  // рендер одного поля по имени (id полей неизменны → currentForm() их читает по наличию)
  function fieldHtml(fn,o){ var L=window.LABELS.fields; switch(fn){
    case 'n':         return fld(L.n,'<input id="f_n" value="'+(o.n!=null?o.n:'')+'">');
    case 'label':     return fld(L.label,'<input id="f_label" value="'+(o.label||'')+'">');
    case 'fragment':  return fld(L.fragment,'<input id="f_frag" value="'+(o.fragment||'')+'">');
    case 'decoy':     return fld(L.decoy,'<select id="f_decoy"><option value="">нет</option><option value="1" '+(o.decoy?'selected':'')+'>да</option></select>');
    case 'code':      return fld(L.code,'<input id="f_code" value="'+((o.code||[]).join(','))+'">');
    case 'reveals':   return fld(L.reveals,'<input id="f_reveals" value="'+(o.reveals||'')+'">');
    case 'onSuccess': return fld(L.onSuccess,'<input id="f_sf" value="'+((o.onSuccess&&o.onSuccess.flag)||'')+'">');
    case 'leadsTo':   return fld(L.leadsTo,'<input id="f_leadsTo" value="'+(o.leadsTo||'')+'">');
    default: return '';
  } }

  function openForm(idx){ editIdx=idx;
    var def={ kind:window.SCHEMA.KINDS[0], side:Object.keys(cfg.sides||{})[0]||'shared', coord:'' };
    renderForm(idx===null ? def : cfg.objectives[idx], false); }

  // читает текущие введённые поля (какие есть для выбранного kind)
  function currentForm(){
    var o={ id:val('f_id'), kind:val('f_kind'), side:val('f_side') };
    if(val('f_coord')) o.coord=val('f_coord');
    if(has('f_n') && val('f_n')!=='') o.n=parseInt(val('f_n'),10);
    if(val('f_label')) o.label=val('f_label');
    if(val('f_frag')) o.fragment=val('f_frag');
    if(has('f_decoy') && el('f_decoy').value) o.decoy=true;
    if(val('f_reveals')) o.reveals=val('f_reveals');
    if(val('f_leadsTo')) o.leadsTo=val('f_leadsTo');
    if(val('f_sf')) o.onSuccess={event:'flag',flag:val('f_sf')};
    if(val('f_code')) o.code=val('f_code').split(',').map(function(s){return s.trim().toUpperCase();});
    return o;
  }

  // форма по kind: общие + релевантные типу + «Расширенное» (reveal/onOpen, дефолт из kind)
  function renderForm(o, freshAdv){
    var k=o.kind||'checkpoint', kd=kindDefaults(k), rv,rvFlag,oo,ooFlag;
    if(!freshAdv && o.reveal!==undefined){ rv=typeof o.reveal==='string'?o.reveal:(o.reveal.scope==='side'?'flag-side':'flag-any'); rvFlag=(o.reveal&&o.reveal.flag)||''; }
    else { rv=kd.reveal; rvFlag=kd.rvflag||''; }
    if(!freshAdv && o.onOpen!==undefined){ oo=!o.onOpen?'none':(o.onOpen.event==='capture'?'capture':(o.onOpen.contest?'flag-contest':'flag')); ooFlag=(o.onOpen&&o.onOpen.flag)||''; }
    else { oo=kd.onOpen; ooFlag=kd.ooflag||''; }
    var L=window.LABELS;
    var h=fld(L.fields.id,'<input id="f_id" value="'+(o.id||'')+'">')
      +'<div><label>'+L.fields.kind+'</label><select id="f_kind">'+opt(window.SCHEMA.KINDS,k,L.kinds)+'</select></div>'
      +fld(L.fields.side,'<select id="f_side">'+sideOpts(o.side)+'</select>')
      +fld(L.fields.coord,'<select id="f_coord">'+coordOpts(o.coord)+'</select>');
    (window.SCHEMA.FIELDS[k]||[]).forEach(function(fn){ h+=fieldHtml(fn,o); });   // поля под тип — из schema.FIELDS
    h+='<details class="full advbox"><summary>Расширенное · показ / событие (по умолчанию из типа)</summary><div class="advgrid">'
      +fld(L.fields.reveal,'<select id="f_rv">'+opt(window.SCHEMA.ENUMS.reveal,rv,L.reveal)+'</select>')
      +fld(L.fields.rvflag,'<input id="f_rvflag" value="'+rvFlag+'">')
      +fld(L.fields.onOpen,'<select id="f_oo">'+opt(window.SCHEMA.ENUMS.onOpen,oo,L.onOpen)+'</select>')
      +fld(L.fields.ooflag,'<input id="f_ooflag" value="'+ooFlag+'">')
      +'</div></details>'
      +'<div class="full" style="margin-top:8px"><button class="pri" id="f_save">Применить</button> <button id="f_cancel">Отмена</button></div>';
    var f=el('form'); f.style.display='grid'; f.className='form'; f.innerHTML=h;
    el('f_kind').onchange=function(){ renderForm(currentForm(), true); };   // смена kind → поля по типу + дефолты reveal/onOpen
    el('f_save').onclick=saveForm; el('f_cancel').onclick=function(){ f.style.display='none'; };
  }

  function val(id){ var e=el(id); return e?e.value.trim():''; }
  function saveForm(){
    var o=currentForm();
    var rv=val('f_rv'), rvf=val('f_rvflag');
    if((rv==='flag-side'||rv==='flag-any') && !rvf){ alert('Для reveal=flag-* укажи имя флага'); return; }
    o.reveal = rv==='flag-side'?{flag:rvf,scope:'side'} : rv==='flag-any'?{flag:rvf,scope:'any'} : rv;
    var oo=val('f_oo'), oof=val('f_ooflag');
    if((oo==='flag'||oo==='flag-contest') && !oof){ alert('Для onOpen=flag укажи имя флага'); return; }
    if(oo==='capture') o.onOpen={event:'capture'};
    else if(oo==='flag') o.onOpen={event:'flag',flag:oof};
    else if(oo==='flag-contest') o.onOpen={event:'flag',flag:oof,contest:true};
    if(!o.id){ alert('Нужен id'); return; }
    if(editIdx===null) cfg.objectives.push(o); else cfg.objectives[editIdx]=o;
    el('form').style.display='none'; renderTable();
  }

  el('add').onclick=function(){ openForm(null); };
  el('seed').onclick=function(){ if(confirm('Сбросить конфиг до пустого шаблона (новый прогон)?')){ cfg=defCfg(); renderAll(); } };
  el('save').onclick=function(){
    readSettings(); readCoords();
    State.saveConfig(cfg).then(function(){ msg('сохранено ✓'); }, function(e){ alert('Ошибка: '+e.message); });
  };
})();
</script>
</body>
</html>
