<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050403">
<title>Зона эвакуации · Коалиция</title>
<style>
  :root{
    --bg:#050403; --panel:#0b0907;
    --line:rgba(214,160,82,.16); --line-soft:rgba(214,160,82,.08);
    --ink:#b89a63; --ink-dim:#6f5d3c;
    --amber:#e3ad45; --amber-hot:#ffc24d; --rust:#8a3b2c;
    --green:#57c98a; --green-hot:#7fe3a8;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased;
    background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
    background-size:38px 38px;background-position:center;
    display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px;
  }
  .card{
    position:relative;width:100%;max-width:420px;background:linear-gradient(180deg,var(--panel),#070605);
    border:1px solid var(--line);padding:34px 26px 26px;animation:rise .5s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card::before,.card::after,.bk::before,.bk::after{content:"";position:absolute;width:16px;height:16px;border:1.5px solid var(--green);pointer-events:none}
  .card::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .card::after{top:-1px;right:-1px;border-left:0;border-bottom:0}
  .bk::before{bottom:-1px;left:-1px;border-right:0;border-top:0}
  .bk::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
  .eyebrow{display:flex;align-items:center;gap:9px;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:26px}
  .eyebrow .tick{width:7px;height:7px;background:var(--green);box-shadow:0 0 6px var(--green)}
  .eyebrow .rule{flex:1;height:1px;background:var(--line)}
  .point{display:flex;align-items:baseline;gap:14px;margin-bottom:20px}
  .point .lbl{font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-dim)}
  .point .num{font-size:40px;line-height:.9;font-weight:600;letter-spacing:.08em;color:var(--green)}
  .lead{font-size:12.5px;line-height:1.6;color:var(--ink);margin-bottom:22px}
  .readout{border:1px solid var(--line);background:rgba(0,0,0,.35);padding:16px 16px 18px}
  .readout .head{display:flex;align-items:center;gap:9px;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:12px}
  .lock{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  @media (prefers-reduced-motion:no-preference){.lock{animation:blink 2.4s steps(1) infinite}@keyframes blink{0%,72%{opacity:1}73%,100%{opacity:.25}}}
  .coords{font-size:21px;line-height:1.45;font-weight:600;color:var(--green-hot);word-break:break-word;text-shadow:0 0 14px rgba(127,227,168,.18)}
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:22px}
  .btn{appearance:none;cursor:pointer;text-decoration:none;font-family:var(--mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;
    padding:15px 16px;text-align:center;border:1px solid var(--line);background:transparent;color:var(--ink);transition:border-color .15s,color .15s,background .15s}
  .btn:hover{border-color:var(--green);color:var(--green)}
  .btn-primary{border-color:rgba(87,201,138,.45);color:var(--green)}
  .btn-primary:hover{background:rgba(87,201,138,.07)}
  .btn-primary.ok{border-color:var(--green-hot);color:var(--green-hot);background:rgba(127,227,168,.08)}
  .footer{display:flex;align-items:center;gap:9px;margin-top:24px;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--green)}
  .footer .rule{flex:1;height:1px;background:rgba(87,201,138,.28)}
</style>
</head>
<body>
  <main class="card">
    <span class="bk"></span>
    <div class="eyebrow"><span class="tick"></span>Песчаный факел · Эвакуация · Коалиция<span class="rule"></span></div>
    <div class="point"><span class="lbl">Зона</span><span class="num">EVAC</span></div>
    <p class="lead">«Шихаб» активирован — борт на подходе. Выходите к зоне эвакуации и держите периметр до подбора.</p>
    <div class="readout">
      <div class="head"><span class="lock"></span>Координаты эвакуации</div>
      <div class="coords" id="coords">43.795844, 77.050030</div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="copyBtn" type="button">Скопировать координаты</button>
      <a class="btn" id="mapBtn" href="https://www.google.com/maps?q=43.795844,77.050030" target="_blank" rel="noopener">Открыть в картах</a>
    </div>
    <div class="footer"><span class="rule"></span>борт на подходе · одна жизнь<span class="rule"></span></div>
  </main>

<script>
  (function(){
    var btn=document.getElementById('copyBtn'), coords=document.getElementById('coords').textContent.trim(), label=btn.textContent, t;
    function done(){ btn.classList.add('ok'); btn.textContent='Скопировано ✓'; clearTimeout(t); t=setTimeout(function(){ btn.classList.remove('ok'); btn.textContent=label; },1600); }
    function fallback(){ var ta=document.createElement('textarea'); ta.value=coords; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select(); try{ document.execCommand('copy'); done(); }catch(e){} document.body.removeChild(ta); }
    btn.addEventListener('click', function(){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(coords).then(done,fallback); } else { fallback(); } });
  })();
</script>

</html>
