<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050403">
<title>Ансар аль-Карун · Точка 5</title>
<style>
  :root{
    /* warm near-black + amber phosphor: dim by design for night ops */
    --bg:#050403; --panel:#0b0907;
    --line:rgba(214,160,82,.16); --line-soft:rgba(214,160,82,.08);
    --ink:#b89a63; --ink-dim:#6f5d3c;
    --amber:#e3ad45; --amber-hot:#ffc24d; --rust:#8a3b2c;
    --green:#57c98a; /* успех/доступ открыт — фосфорный зелёный */
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--mono);
    -webkit-font-smoothing:antialiased;
    background-image:
      linear-gradient(var(--line-soft) 1px,transparent 1px),
      linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
    background-size:38px 38px;background-position:center;
    display:flex;align-items:center;justify-content:center;
    min-height:100dvh;padding:24px;
  }
  .card{
    position:relative;width:100%;max-width:420px;
    background:linear-gradient(180deg,var(--panel),#070605);
    border:1px solid var(--line);padding:34px 26px 26px;animation:rise .5s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  /* signature: tactical corner brackets */
  .card::before,.card::after,.bk::before,.bk::after{
    content:"";position:absolute;width:16px;height:16px;
    border:1.5px solid var(--amber);pointer-events:none;
  }
  .card::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .card::after{top:-1px;right:-1px;border-left:0;border-bottom:0}
  .bk::before{bottom:-1px;left:-1px;border-right:0;border-top:0}
  .bk::after{bottom:-1px;right:-1px;border-left:0;border-top:0}

  .eyebrow{
    display:flex;align-items:center;gap:9px;
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:26px;
  }
  .eyebrow .tick{width:7px;height:7px;background:var(--rust);box-shadow:0 0 6px var(--rust)}
  .eyebrow .rule{flex:1;height:1px;background:var(--line)}

  .point{display:flex;align-items:baseline;gap:14px;margin-bottom:30px}
  .point .lbl{font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-dim)}
  .point .num{font-size:72px;line-height:.8;font-weight:600;color:var(--amber);font-variant-numeric:tabular-nums}

  .readout{border:1px solid var(--line);background:rgba(0,0,0,.35);padding:16px 16px 18px}
  .readout + .readout{margin-top:14px}
  .readout .head{
    display:flex;align-items:center;gap:9px;
    font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:12px;
  }
  .lock{width:8px;height:8px;border-radius:50%;background:var(--amber-hot);box-shadow:0 0 8px var(--amber-hot)}
  @media (prefers-reduced-motion:no-preference){
    .lock{animation:blink 2.4s steps(1) infinite}
    @keyframes blink{0%,72%{opacity:1}73%,100%{opacity:.25}}
  }
  .coords{
    font-size:21px;line-height:1.45;font-weight:600;color:var(--amber-hot);
    word-break:break-word;text-shadow:0 0 14px rgba(255,194,77,.18);
  }
  .frag{
    font-size:30px;line-height:1.2;font-weight:600;letter-spacing:.22em;
    color:var(--amber-hot);text-shadow:0 0 14px rgba(255,194,77,.18);
  }

  .actions{display:flex;flex-direction:column;gap:10px;margin-top:22px}
  .btn{
    appearance:none;cursor:pointer;text-decoration:none;font-family:var(--mono);
    font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:15px 16px;text-align:center;
    border:1px solid var(--line);background:transparent;color:var(--ink);
    transition:border-color .15s,color .15s,background .15s;
  }
  .btn:hover{border-color:var(--amber);color:var(--amber)}
  .btn:focus-visible{outline:2px solid var(--amber-hot);outline-offset:2px}
  .btn-primary{border-color:rgba(227,173,69,.45);color:var(--amber)}
  .btn-primary:hover{background:rgba(227,173,69,.07)}
  .btn-primary.ok{border-color:var(--amber-hot);color:var(--amber-hot);background:rgba(255,194,77,.08)}

  .footer{
    display:flex;align-items:center;gap:9px;margin-top:24px;
    font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);
  }
  .footer .rule{flex:1;height:1px;background:var(--line)}

  /* --- терминал расшифровки (point7) --- */
  .lead{font-size:12.5px;line-height:1.6;color:var(--ink);margin-bottom:22px}
  .code{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
  .code input{
    font-family:var(--mono);font-size:17px;letter-spacing:.12em;text-align:center;text-transform:uppercase;
    color:var(--amber-hot);background:rgba(0,0,0,.35);border:1px solid var(--line);
    padding:14px 4px;width:100%;outline:none;transition:border-color .15s;
  }
  .code input:focus{border-color:var(--amber-hot)}
  .code.err input{border-color:var(--rust);color:#c66}
  .status{min-height:16px;margin-top:14px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim)}
  .status.bad{color:var(--rust)}
  .status.good{color:var(--green)}
  /* раскрытый блок успеха: индикатор и футер — зелёные */
  #openView .lock{background:var(--green);box-shadow:0 0 8px var(--green)}
  .footer.ok{color:var(--green)}
  .footer.ok .rule{background:rgba(87,201,138,.28)}
  .hidden{display:none}
  @keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}
  .card.shake{animation:shake .4s}
</style>
</head>
<body>
  <main class="card">
    <span class="bk"></span>

    <div class="eyebrow"><span class="tick"></span>Разведточка · Night ops<span class="rule"></span></div>

    <div class="point">
      <span class="lbl">Точка</span>
      <span class="num">5</span>
    </div>

    <!-- ===== КООРДИНАТЫ ТОЧКИ (как в point1.html) ===== -->
    <div class="readout">
      <div class="head"><span class="lock"></span>Координаты</div>
      <!-- TODO: координаты точки 5 (DATA.sides.ansar.points[4].coords.display) -->
      <div class="coords" id="coords">43.813710, 77.051218</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="copyBtn" type="button">Скопировать координаты</button>
      <!-- TODO: ссылка на карту точки 5 (DATA.sides.ansar.points[4].coords.maps) -->
      <a class="btn" id="mapBtn" href="https://www.google.com/maps?q=43.813710,77.051218" target="_blank" rel="noopener">Открыть в картах</a>
    </div>
  </main>

<script>
  (function(){
    
  function bindCopy(btn, text){
    var label = btn.getAttribute('data-label') || btn.textContent;
    var okText = btn.getAttribute('data-ok') || 'Скопировано ✓';
    var t;
    function done(){
      btn.classList.add('ok'); btn.textContent = okText;
      clearTimeout(t); t = setTimeout(function(){ btn.classList.remove('ok'); btn.textContent = label; }, 1600);
    }
    function fallback(){
      var ta=document.createElement('textarea');
      ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand('copy'); done(); }catch(e){}
      document.body.removeChild(ta);
    }
    btn.addEventListener('click', function(){
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(done, fallback);
      } else { fallback(); }
    });
  }

    bindCopy(document.getElementById('copyBtn'), document.getElementById('coords').textContent.trim());
  })();
</script>
</body>
</html>
