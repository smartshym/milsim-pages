<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050403">
<title>Пилот · Песчаная буря</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --bg:#050403; --panel:#0b0907cc;
    --line:rgba(214,160,82,.22); --ink:#b89a63; --ink-dim:#6f5d3c;
    --amber:#e3ad45; --amber-hot:#ffc24d; --green:#57c98a; --rust:#8a3b2c;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);overflow:hidden}
  #map{position:absolute;inset:0;background:var(--bg)}
  .leaflet-container{background:var(--bg)}

  .top{position:absolute;top:10px;left:10px;right:10px;z-index:1000;
    background:var(--panel);border:1px solid var(--line);padding:9px 12px;backdrop-filter:blur(4px)}
  #legend{display:flex;flex-wrap:wrap;gap:5px 12px}
  #legend .chip{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--ink)}
  #legend .dot{width:10px;height:10px;border-radius:50%;border:1px solid #000}
  .hint{margin-top:6px;font-size:10.5px;color:var(--ink-dim)}

  #panel{
    position:absolute;left:10px;right:10px;bottom:10px;z-index:1000;
    background:var(--panel);border:1px solid var(--line);padding:12px 14px;
    backdrop-filter:blur(4px);font-size:12px;line-height:1.5;
    display:grid;grid-template-columns:repeat(2,1fr);gap:4px 16px;
  }
  #panel .k{color:var(--ink-dim);text-transform:uppercase;letter-spacing:.12em;font-size:10px}
  #panel .v{color:var(--amber-hot);font-weight:600}
  #panel .dist .v{color:var(--green);font-size:15px}
  #panel .full{grid-column:1/-1}
  #msg{color:var(--rust);min-height:14px}
  #goPage{display:block;text-align:center;text-decoration:none;border:1px solid var(--green);
    color:var(--green);padding:9px;letter-spacing:.08em;text-transform:uppercase;font-size:11px;margin-top:2px}
  #goPage:hover{background:rgba(87,201,138,.08)}

  /* маркеры */
  .me{width:16px;height:16px;border-radius:50%;background:var(--amber-hot);
    border:2px solid #000;box-shadow:0 0 10px var(--amber-hot)}
  .tgt{width:14px;height:14px;background:#fff;border:2px solid #000;
    box-shadow:0 0 10px #fff;transform:rotate(45deg)}
  .pt{display:flex;align-items:center;justify-content:center;width:20px;height:20px;
    border-radius:50%;border:2px solid #000;color:#0a0a0a;font:600 11px var(--mono);
    box-shadow:0 0 8px rgba(0,0,0,.7)}
  .pt.sel{outline:2px solid #fff;outline-offset:1px}
</style>
</head>
<body>
  <div id="map"></div>
  <div class="top">
    <div id="legend"></div>
    <div class="hint">Тапни по точке — дистанция до неё и переход на её страницу. Тап по пустому — произвольная цель.</div>
  </div>
  <div id="panel">
    <div><div class="k">Широта</div><div class="v" id="lat">—</div></div>
    <div><div class="k">Долгота</div><div class="v" id="lng">—</div></div>
    <div><div class="k">Точность</div><div class="v" id="acc">—</div></div>
    <div><div class="k">На карте</div><div class="v" id="inside">—</div></div>
    <div class="dist"><div class="k">До цели</div><div class="v" id="dist">—</div></div>
    <div><div class="k">Цель</div><div class="v" id="tgtlbl">—</div></div>
    <div><div class="k">Пиксель X/Y</div><div class="v" id="px">—</div></div>
    <div><div class="k">Точек</div><div class="v" id="count">—</div></div>
    <div class="full"><div class="k">Обновлено</div><div class="v" id="time">ожидание GPS…</div></div>
    <div class="full"><a id="goPage" href="#" style="display:none">Открыть страницу точки →</a></div>
    <div class="full"><div id="msg"></div></div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // --- георефференс из KMZ (GroundOverlay, без поворота) ---
  var GEO = { north:43.81687355441687, south:43.78795236649337,
              east:77.07101927537143,  west:77.04279873867411,
              imgW:2445, imgH:3455 };
  var bounds = [[GEO.south, GEO.west],[GEO.north, GEO.east]];

  // ============================================================
  //  ТОЧКИ ПО КАТЕГОРИЯМ.
  //  numbered:true -> маркеры 1..N; prefix+slugs -> страницы рекона.
  //  tag -> метка одиночного маркера; page -> ссылка одиночной точки.
  // ============================================================
  var LISTS = {
    coalition: { label:'Коалиция',  color:'#4d9bff', numbered:true, prefix:'c',
      slugs:['qxtlbu','rxases','pmvaxm','jlkxyr','jufkdt','vmipxc','isailq'], points:[
      "43.804082, 77.053668", "43.806936, 77.055886", "43.809940, 77.054615",
      "43.813578, 77.057381", "43.813807, 77.051281", "43.809303, 77.049874",
      "43.805200, 77.050870",
    ]},
    insurgents:{ label:'Повстанцы', color:'#ff4d4d', numbered:true, prefix:'p',
      slugs:['qobsxm','jhoiyk','bsginh','nxrabv','lsubvf','ulydur','ccpdnu'], points:[
      "43.803964, 77.056651", "43.806824, 77.056102", "43.809647, 77.058284",
      "43.813552, 77.057619", "43.813710, 77.051218", "43.809332, 77.050331",
      "43.804906, 77.050699",
    ]},
    parking: { label:'Парковка',     color:'#57c98a', tag:'P', points:["43.799435, 77.048836"] },
    capture: { label:'Точка захвата', color:'#ff9a2e', tag:'З', points:["43.802538, 77.050063"] },
    evac:    { label:'Эвакуация',    color:'#ffd24d', tag:'Э', page:'../sandtorch/evac.html', points:["43.795844, 77.050030"] },
  };

  // парсер: строка координат или maps-ссылки -> L.latLng | null
  function parseLoc(s){
    s=(s||'').trim(); if(!s) return null;
    var m = s.match(/@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/)
         || s.match(/[?&](?:q|query|ll|destination|daddr)=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/);
    if(m) return L.latLng(+m[1], +m[2]);
    var n = s.match(/-?\d+(?:\.\d+)?/g);
    if(n && n.length>=2){
      var lat=+n[0], lng=+n[1];
      if(/s/i.test(s) && lat>0) lat=-lat;
      if(/w/i.test(s) && lng>0) lng=-lng;
      return L.latLng(lat,lng);
    }
    return null;
  }

  var map = L.map('map', { zoomSnap:0.25, maxZoom:20 });
  // спутник: у Google покрытие этого района (Алматинская обл.) лучше, чем у Esri
  var gsat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
    { subdomains:['mt0','mt1','mt2','mt3'], maxZoom:21, attribution:'Google' });
  var esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom:20, maxNativeZoom:17, attribution:'Esri' });   // кап зума — чтобы не было «not available»
  // рисованная карта (georeferenced overlay)
  var drawn = L.imageOverlay('Boloto_v1.05.jpg', bounds);
  gsat.addTo(map);                                 // по умолчанию — Google спутник
  map.fitBounds(bounds);
  map.setMaxBounds(L.latLngBounds(bounds).pad(0.3));
  L.control.layers(
    { 'Спутник (Google)':gsat, 'Спутник (Esri)':esri, 'Рисованная карта':drawn },
    null, { collapsed:false }
  ).addTo(map);

  function set(id,t){ var e=document.getElementById(id); if(e) e.textContent=t; }
  function px(ll){ return {
    x: Math.round((ll.lng-GEO.west)/(GEO.east-GEO.west)*GEO.imgW),
    y: Math.round((GEO.north-ll.lat)/(GEO.north-GEO.south)*GEO.imgH) }; }

  // выбранная цель + линия + кнопка перехода на страницу
  var selected=null, link=null, selEl=null, go=document.getElementById('goPage');
  function selectTarget(ll, label, el, page){
    selected=ll; set('tgtlbl', label);
    if(selEl) selEl.classList.remove('sel');
    selEl = el||null; if(selEl) selEl.classList.add('sel');
    if(page){ go.href=page; go.textContent='Открыть: '+label+' →'; go.style.display='block'; }
    else { go.style.display='none'; }
    update();
  }

  // отрисовка категорий
  var total=0, bad=0, legend=document.getElementById('legend');
  Object.keys(LISTS).forEach(function(key){
    var cfg=LISTS[key], n=0;
    cfg.points.forEach(function(raw,i){
      var ll=parseLoc(raw);
      if(!ll){ bad++; console.warn('не распознано ['+key+' #'+(i+1)+']:', raw); return; }
      total++; n++;
      var txt = cfg.numbered ? (i+1) : (cfg.tag||'');
      var label = cfg.numbered ? (cfg.label+' '+(i+1)) : cfg.label;
      var page = cfg.numbered
        ? '../sandtorch/'+key+'/'+cfg.prefix+'-'+cfg.slugs[i]+'-0'+(i+1)+'.html'
        : (cfg.page||null);
      var icon=L.divIcon({className:'', iconSize:[20,20], iconAnchor:[10,10],
        html:'<div class="pt" style="background:'+cfg.color+'">'+txt+'</div>'});
      var mk=L.marker(ll,{icon:icon, title:label}).addTo(map);
      mk.on('click', function(e){
        L.DomEvent.stopPropagation(e);
        var el = mk.getElement() ? mk.getElement().querySelector('.pt') : null;
        selectTarget(ll, label, el, page);
      });
    });
    var chip=document.createElement('div'); chip.className='chip';
    chip.innerHTML='<span class="dot" style="background:'+cfg.color+'"></span>'+cfg.label+' ('+n+')';
    legend.appendChild(chip);
  });
  set('count', total+(bad?(' (+'+bad+' ошибок)'):''));

  // произвольная цель — тап по пустому месту
  var randIcon=L.divIcon({className:'', html:'<div class="tgt"></div>', iconSize:[14,14], iconAnchor:[7,7]});
  var randMarker=null;
  map.on('click', function(e){
    if(!randMarker) randMarker=L.marker(e.latlng,{icon:randIcon}).addTo(map);
    else randMarker.setLatLng(e.latlng);
    selectTarget(e.latlng, 'произвольная', null, null);
  });

  // игрок
  var meIcon=L.divIcon({className:'', html:'<div class="me"></div>', iconSize:[16,16], iconAnchor:[8,8]});
  var me=null, acc=null, last=null;

  function update(){
    if(!last || !selected) return;
    var d = map.distance(last, selected);
    set('dist', d>=1000 ? (d/1000).toFixed(2)+' км' : Math.round(d)+' м');
    if(!link) link=L.polyline([last,selected],{color:'#ffc24d',weight:1,dashArray:'4,4'}).addTo(map);
    else link.setLatLngs([last,selected]);
  }

  function onPos(pos){
    var c=pos.coords; last=L.latLng(c.latitude,c.longitude);
    if(!me){ me=L.marker(last,{icon:meIcon}).addTo(map); acc=L.circle(last,{radius:c.accuracy,color:'#ffc24d',weight:1,fillOpacity:.06}).addTo(map); map.setView(last,16); }
    else { me.setLatLng(last); acc.setLatLng(last).setRadius(c.accuracy); }
    set('lat', c.latitude.toFixed(6)); set('lng', c.longitude.toFixed(6));
    set('acc', Math.round(c.accuracy)+' м');
    set('inside', L.latLngBounds(bounds).contains(last)?'да':'вне карты');
    var p=px(last); set('px', p.x+' / '+p.y);
    set('time', new Date(pos.timestamp).toLocaleTimeString('ru-RU'));
    set('msg',''); update();
  }
  function onErr(e){ set('msg','GPS: '+e.message+' (нужен https или localhost + разрешение)'); }

  if(!navigator.geolocation){ set('msg','Геолокация не поддерживается'); }
  else navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,maximumAge:1000,timeout:15000});
</script>
</body>
</html>
